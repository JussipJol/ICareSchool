<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель администратора — ICare4School</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .state-blue { background-color: #003366; }
        .sidebar { background-color: #001f3f; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.25s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen flex">
<div id="root" class="flex-1 flex"></div>

<script type="text/babel">
    const { useState, useEffect, useCallback } = React;
    const API_BASE = "/api";

    const STATUSES = ['Принято', 'На рассмотрении', 'Направлено по компетентности', 'Завершено'];

    const STATUS_STYLES = {
        'Принято':                        'bg-blue-100 text-blue-700 border-blue-200',
        'На рассмотрении':               'bg-amber-100 text-amber-700 border-amber-200',
        'Направлено по компетентности':  'bg-purple-100 text-purple-700 border-purple-200',
        'Завершено':                      'bg-emerald-100 text-emerald-700 border-emerald-200',
    };

    const DECISION_TYPES = [
        { value: 'territorial',     label: 'Направление в территориальные подразделения образования' },
        { value: 'law_enforcement', label: 'Направление по компетентности (правоохранительные органы)' },
        { value: 'no_action',       label: 'Оставление без рассмотрения' },
    ];

    const LAW_ENFORCEMENT_BODIES = [
        'Органы прокуратуры',
        'Служба по противодействию коррупции',
        'Органы Комитета национальной безопасности',
        'Агентство Республики Казахстан по финансовому мониторингу',
        'Иной уполномоченный орган',
    ];

    function addBusinessDays(dateStr, days) {
        let count = 0;
        let d = new Date(dateStr);
        while (count < days) {
            d.setDate(d.getDate() + 1);
            const dow = d.getDay();
            if (dow !== 0 && dow !== 6) count++;
        }
        return d;
    }

    function deadlineInfo(createdAt) {
        const deadline = addBusinessDays(createdAt, 5);
        const now = new Date();
        const overdue = now > deadline;
        const diffMs = deadline - now;
        const diffDays = Math.ceil(diffMs / (1000 * 60 * 60 * 24));
        return { deadline, overdue, diffDays };
    }

    const StatusBadge = ({ status }) => (
        <span className={`px-3 py-1 rounded-full text-xs font-bold border ${STATUS_STYLES[status] || 'bg-gray-100 text-gray-600'}`}>
            {status}
        </span>
    );

    const AdminApp = () => {
        const [token, setToken] = useState(localStorage.getItem('admin_token'));
        const [reports, setReports] = useState([]);
        const [filter, setFilter] = useState({ region: '', category: '', status: '' });
        const [selectedReport, setSelectedReport] = useState(null);
        const [saving, setSaving] = useState(false);
        const [showQr, setShowQr] = useState(false);

        const [username, setUsername] = useState('');
        const [password, setPassword] = useState('');
        const [loginError, setLoginError] = useState('');

        // Modal form state
        const [statusToSet, setStatusToSet] = useState('');
        const [responseText, setResponseText] = useState('');
        const [decisionType, setDecisionType] = useState('');
        const [referredTo, setReferredTo] = useState('');
        const [decisionGrounds, setDecisionGrounds] = useState('');
        const [decisionEvidence, setDecisionEvidence] = useState('');

        useEffect(() => {
            if (typeof lucide !== 'undefined') lucide.createIcons();
        });

        useEffect(() => {
            if (token) fetchReports();
        }, [token]);

        const fetchReports = async () => {
            try {
                const res = await fetch(`${API_BASE}/admin/complaints`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.status === 401) { handleLogout(); return; }
                setReports(await res.json());
            } catch (err) { console.error(err); }
        };

        const handleLogin = async (e) => {
            e.preventDefault();
            setLoginError('');
            const body = new URLSearchParams();
            body.append('username', username);
            body.append('password', password);
            try {
                const res = await fetch(`${API_BASE}/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: body.toString()
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('admin_token', data.access_token);
                    setToken(data.access_token);
                } else {
                    setLoginError('Неверный логин или пароль');
                }
            } catch { setLoginError('Ошибка соединения с сервером'); }
        };

        const handleLogout = () => { localStorage.removeItem('admin_token'); setToken(null); };

        const openReport = (report) => {
            setSelectedReport(report);
            setStatusToSet(report.status);
            setResponseText(report.admin_response || '');
            setDecisionType(report.decision_type || '');
            setReferredTo(report.referred_to || '');
            setDecisionGrounds(report.decision_grounds || '');
            setDecisionEvidence(report.decision_evidence || '');
        };

        const needsDecision = statusToSet === 'Завершено' || statusToSet === 'Направлено по компетентности';

        const handleSave = async () => {
            if (needsDecision && !decisionType) { alert('Укажите тип решения'); return; }
            if (needsDecision && !decisionGrounds.trim()) { alert('Заполните основания принятия решения'); return; }
            if (needsDecision && !decisionEvidence.trim()) { alert('Заполните оценку представленных материалов'); return; }
            if (decisionType === 'law_enforcement' && !referredTo) { alert('Укажите орган, в который направляется обращение'); return; }

            setSaving(true);
            try {
                const payload = {
                    status: statusToSet,
                    admin_response: responseText || null,
                    decision_type: decisionType || null,
                    referred_to: referredTo || null,
                    decision_grounds: decisionGrounds || null,
                    decision_evidence: decisionEvidence || null,
                };
                const res = await fetch(`${API_BASE}/admin/complaints/${selectedReport.id}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });
                if (res.ok) { setSelectedReport(null); fetchReports(); }
                else alert('Ошибка сохранения');
            } catch { alert('Ошибка сети'); }
            setSaving(false);
        };

        if (!token) {
            return (
                <div className="flex-1 flex items-center justify-center bg-slate-900">
                    <div className="bg-white p-10 rounded-2xl shadow-2xl w-full max-w-md">
                        <div className="text-center mb-8">
                            <div className="inline-flex items-center justify-center w-14 h-14 rounded-2xl state-blue mb-4">
                                <i data-lucide="shield-alert" className="w-7 h-7 text-white"></i>
                            </div>
                            <h2 className="text-2xl font-black text-slate-800">Вход в систему</h2>
                            <p className="text-slate-500 mt-1 text-sm">Агентство по делам государственной службы</p>
                        </div>
                        <form onSubmit={handleLogin} className="space-y-5">
                            <div>
                                <label className="block text-sm font-bold text-slate-700 mb-2">Логин</label>
                                <input type="text" value={username} onChange={e=>setUsername(e.target.value)} required
                                    className="w-full p-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-600 outline-none" />
                            </div>
                            <div>
                                <label className="block text-sm font-bold text-slate-700 mb-2">Пароль</label>
                                <input type="password" value={password} onChange={e=>setPassword(e.target.value)} required
                                    className="w-full p-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-600 outline-none" />
                            </div>
                            {loginError && <p className="text-red-500 text-sm font-bold">{loginError}</p>}
                            <button type="submit" className="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-4 rounded-xl transition-colors">
                                Войти
                            </button>
                        </form>
                    </div>
                </div>
            );
        }

        const filteredReports = reports.filter(r =>
            (!filter.region   || r.region.name === filter.region) &&
            (!filter.category || r.category === filter.category) &&
            (!filter.status   || r.status === filter.status)
        );

        const overdueCount = reports.filter(r => {
            if (r.status === 'Завершено' || r.status === 'Направлено по компетентности') return false;
            return deadlineInfo(r.created_at).overdue;
        }).length;

        return (
            <div className="flex-1 flex overflow-hidden">
                {/* Sidebar */}
                <aside className="sidebar w-64 flex-shrink-0 flex flex-col h-screen text-white/80">
                    <div className="p-6 border-b border-white/10 flex items-center space-x-3">
                        <i data-lucide="shield-alert" className="w-6 h-6 text-blue-400"></i>
                        <span className="font-black text-lg tracking-tight text-white">ICare4School</span>
                    </div>
                    <nav className="flex-1 p-4 space-y-1">
                        <div className="bg-blue-600 text-white p-3 rounded-xl flex items-center justify-between cursor-pointer">
                            <div className="flex items-center space-x-3">
                                <i data-lucide="file-text" className="w-5 h-5"></i>
                                <span className="font-semibold text-sm">Обращения</span>
                            </div>
                            {overdueCount > 0 && (
                                <span className="bg-red-500 text-white text-xs font-black rounded-full w-5 h-5 flex items-center justify-center">{overdueCount}</span>
                            )}
                        </div>
                        <div className="hover:bg-white/5 p-3 rounded-xl flex items-center space-x-3 cursor-pointer transition-colors"
                             onClick={() => setShowQr(true)}>
                            <i data-lucide="qr-code" className="w-5 h-5"></i>
                            <span className="text-sm">QR-код</span>
                        </div>
                    </nav>
                    <div className="p-4 border-t border-white/10 flex items-center justify-between">
                        <div className="flex items-center space-x-3">
                            <div className="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center font-bold text-white text-xs">А</div>
                            <p className="text-sm font-bold text-white">Администратор</p>
                        </div>
                        <button onClick={handleLogout} className="text-white/40 hover:text-red-400 transition-colors">
                            <i data-lucide="log-out" className="w-5 h-5"></i>
                        </button>
                    </div>
                </aside>

                {/* Main */}
                <main className="flex-1 flex flex-col bg-slate-50 overflow-hidden">
                    <header className="h-16 bg-white border-b border-slate-200 px-8 flex items-center justify-between flex-shrink-0">
                        <div className="flex items-center gap-4">
                            <h2 className="text-xl font-bold text-slate-800">Реестр обращений</h2>
                            {overdueCount > 0 && (
                                <span className="flex items-center gap-1.5 text-xs font-bold text-red-600 bg-red-50 border border-red-200 px-3 py-1 rounded-full">
                                    <i data-lucide="alert-circle" className="w-3.5 h-3.5"></i>
                                    {overdueCount} просроченных
                                </span>
                            )}
                        </div>
                        <button onClick={fetchReports} className="flex items-center gap-2 text-sm text-blue-600 font-semibold hover:bg-blue-50 px-3 py-2 rounded-lg transition-colors">
                            <i data-lucide="refresh-cw" className="w-4 h-4"></i> Обновить
                        </button>
                    </header>

                    <div className="flex-1 p-6 overflow-y-auto">
                        {/* Filters */}
                        <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 mb-6 flex flex-wrap gap-4">
                            <div className="space-y-1">
                                <label className="text-xs font-bold text-slate-400 uppercase tracking-wide">Регион</label>
                                <select className="block w-44 p-2.5 rounded-lg border border-slate-200 bg-slate-50 text-sm"
                                    onChange={e => setFilter({...filter, region: e.target.value})}>
                                    <option value="">Все регионы</option>
                                    {[...new Set(reports.map(r => r.region.name))].map(n => <option key={n}>{n}</option>)}
                                </select>
                            </div>
                            <div className="space-y-1">
                                <label className="text-xs font-bold text-slate-400 uppercase tracking-wide">Категория</label>
                                <select className="block w-48 p-2.5 rounded-lg border border-slate-200 bg-slate-50 text-sm"
                                    onChange={e => setFilter({...filter, category: e.target.value})}>
                                    <option value="">Все категории</option>
                                    <option>Коррупция</option>
                                    <option>Хищение</option>
                                    <option>Превышение должностных полномочий</option>
                                    <option>Попустительство</option>
                                </select>
                            </div>
                            <div className="space-y-1">
                                <label className="text-xs font-bold text-slate-400 uppercase tracking-wide">Статус</label>
                                <select className="block w-56 p-2.5 rounded-lg border border-slate-200 bg-slate-50 text-sm"
                                    onChange={e => setFilter({...filter, status: e.target.value})}>
                                    <option value="">Все статусы</option>
                                    {STATUSES.map(s => <option key={s}>{s}</option>)}
                                </select>
                            </div>
                        </div>

                        {/* Table */}
                        <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                            <table className="w-full text-left">
                                <thead className="bg-slate-50 border-b border-slate-200">
                                    <tr>
                                        <th className="px-5 py-3.5 text-xs font-black text-slate-400 uppercase tracking-wide">ID / Дата</th>
                                        <th className="px-5 py-3.5 text-xs font-black text-slate-400 uppercase tracking-wide">Школа</th>
                                        <th className="px-5 py-3.5 text-xs font-black text-slate-400 uppercase tracking-wide">Категория</th>
                                        <th className="px-5 py-3.5 text-xs font-black text-slate-400 uppercase tracking-wide">Статус</th>
                                        <th className="px-5 py-3.5 text-xs font-black text-slate-400 uppercase tracking-wide">Срок</th>
                                        <th className="px-5 py-3.5 text-xs font-black text-slate-400 uppercase tracking-wide text-center">Открыть</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100">
                                    {filteredReports.map(report => {
                                        const isDone = report.status === 'Завершено' || report.status === 'Направлено по компетентности';
                                        const { overdue, diffDays, deadline } = deadlineInfo(report.created_at);
                                        return (
                                            <tr key={report.id} className={`hover:bg-slate-50 transition-colors ${overdue && !isDone ? 'bg-red-50/40' : ''}`}>
                                                <td className="px-5 py-4">
                                                    <div className="font-black text-slate-800 tracking-wider text-sm">{report.short_id}</div>
                                                    <div className="text-[10px] text-slate-400 font-semibold uppercase mt-0.5">
                                                        {new Date(report.created_at).toLocaleDateString('ru-RU')}
                                                    </div>
                                                </td>
                                                <td className="px-5 py-4">
                                                    <div className="font-bold text-slate-700 text-sm">{report.school.name}</div>
                                                    <div className="text-xs text-slate-400">{report.city.name}</div>
                                                </td>
                                                <td className="px-5 py-4">
                                                    <div className="text-xs font-bold text-slate-800">{report.category}</div>
                                                    {report.target_person && (
                                                        <div className="text-[10px] text-slate-400 mt-0.5">На: {report.target_person}</div>
                                                    )}
                                                </td>
                                                <td className="px-5 py-4"><StatusBadge status={report.status} /></td>
                                                <td className="px-5 py-4 text-xs font-semibold">
                                                    {isDone ? (
                                                        <span className="text-slate-400">—</span>
                                                    ) : overdue ? (
                                                        <span className="text-red-600 flex items-center gap-1">
                                                            <i data-lucide="alert-triangle" className="w-3.5 h-3.5"></i>
                                                            Просрочено
                                                        </span>
                                                    ) : (
                                                        <span className="text-slate-600">
                                                            {diffDays} дн. ост.
                                                        </span>
                                                    )}
                                                </td>
                                                <td className="px-5 py-4 text-center">
                                                    <button onClick={() => openReport(report)}
                                                        className="p-2 text-blue-600 hover:bg-blue-50 rounded-lg transition-colors">
                                                        <i data-lucide="eye" className="w-5 h-5"></i>
                                                    </button>
                                                </td>
                                            </tr>
                                        );
                                    })}
                                    {filteredReports.length === 0 && (
                                        <tr><td colSpan="6" className="text-center py-12 text-slate-400">Нет обращений</td></tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </main>

                {/* QR Modal */}
                {showQr && (
                    <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                        <div className="bg-white rounded-3xl shadow-2xl w-full max-w-sm overflow-hidden animate-fade-in">
                            <div className="state-blue p-5 text-white flex justify-between items-center">
                                <h3 className="font-black text-lg">QR-код для подачи обращений</h3>
                                <button onClick={() => setShowQr(false)} className="text-white/50 hover:text-white">
                                    <i data-lucide="x" className="w-6 h-6"></i>
                                </button>
                            </div>
                            <div className="p-8 flex flex-col items-center gap-5">
                                <img src="/api/qr" alt="QR код" className="w-56 h-56 rounded-xl border border-slate-100 shadow" />
                                <p className="text-sm text-slate-500 text-center">Отсканируйте камерой телефона — откроется форма подачи обращения</p>
                                <code className="text-xs text-slate-400 bg-slate-50 px-3 py-1.5 rounded-lg border border-slate-200 break-all text-center">
                                    {window.location.origin}/app/index.html
                                </code>
                                <a href="/api/qr" download="icare-qr.png"
                                    className="flex items-center gap-2 text-sm font-bold text-blue-700 hover:bg-blue-50 px-4 py-2.5 rounded-xl transition-colors border border-blue-200">
                                    <i data-lucide="download" className="w-4 h-4"></i>
                                    Скачать PNG
                                </a>
                            </div>
                        </div>
                    </div>
                )}

                {/* Modal */}
                {selectedReport && (
                    <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                        <div className="bg-white rounded-3xl shadow-2xl w-full max-w-2xl overflow-hidden animate-fade-in flex flex-col max-h-[92vh]">
                            <div className="state-blue p-5 text-white flex justify-between items-center flex-shrink-0">
                                <div>
                                    <p className="text-xs text-blue-200 uppercase tracking-widest font-semibold mb-0.5">Обращение</p>
                                    <h3 className="text-xl font-black tracking-tight">{selectedReport.short_id}</h3>
                                </div>
                                <button onClick={() => setSelectedReport(null)} className="text-white/50 hover:text-white transition-colors">
                                    <i data-lucide="x" className="w-6 h-6"></i>
                                </button>
                            </div>

                            <div className="p-7 space-y-5 overflow-y-auto">
                                {/* Info grid */}
                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Категория</p>
                                        <p className="font-bold text-slate-800 mt-0.5">{selectedReport.category}</p>
                                    </div>
                                    <div>
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Школа</p>
                                        <p className="font-bold text-slate-800 mt-0.5">{selectedReport.school.name}</p>
                                    </div>
                                    <div>
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Субъект обращения</p>
                                        <p className="font-bold text-slate-800 mt-0.5">{selectedReport.target_person || 'Не указано'}</p>
                                    </div>
                                    <div>
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Дата подачи</p>
                                        <p className="font-bold text-slate-800 mt-0.5">{new Date(selectedReport.created_at).toLocaleString('ru-RU')}</p>
                                    </div>
                                </div>

                                {/* Deadline */}
                                {(() => {
                                    const isDone = selectedReport.status === 'Завершено' || selectedReport.status === 'Направлено по компетентности';
                                    if (isDone) return null;
                                    const { overdue, diffDays, deadline } = deadlineInfo(selectedReport.created_at);
                                    return (
                                        <div className={`flex items-center gap-3 p-3 rounded-xl border text-sm font-semibold ${overdue ? 'bg-red-50 border-red-200 text-red-700' : 'bg-blue-50 border-blue-200 text-blue-700'}`}>
                                            <i data-lucide={overdue ? 'alert-circle' : 'clock'} className="w-4 h-4 flex-shrink-0"></i>
                                            {overdue
                                                ? `Срок рассмотрения истёк. Дедлайн: ${deadline.toLocaleDateString('ru-RU')}`
                                                : `Срок рассмотрения: до ${deadline.toLocaleDateString('ru-RU')} (осталось ${diffDays} дн.)`}
                                        </div>
                                    );
                                })()}

                                {/* Description */}
                                <div className="border-t border-slate-100 pt-5">
                                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Описание ситуации</p>
                                    <p className="text-slate-700 text-sm leading-relaxed bg-slate-50 p-4 rounded-xl border border-slate-100 whitespace-pre-wrap">
                                        {selectedReport.description}
                                    </p>
                                </div>

                                {selectedReport.attachment_url && (
                                    <div>
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Вложение</p>
                                        <a href={`/app/${selectedReport.attachment_url.replace('../','')}`} target="_blank"
                                            className="text-blue-600 underline text-sm flex items-center gap-2">
                                            <i data-lucide="paperclip" className="w-4 h-4"></i> Просмотреть файл
                                        </a>
                                    </div>
                                )}

                                {/* Action section */}
                                <div className="border-t border-slate-200 pt-5 space-y-4">
                                    <h4 className="font-black text-slate-800">Рассмотрение обращения</h4>

                                    <div>
                                        <label className="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1.5">Статус</label>
                                        <select value={statusToSet} onChange={e => { setStatusToSet(e.target.value); setDecisionType(''); setReferredTo(''); }}
                                            className="w-full p-3 rounded-xl border border-slate-200 text-sm font-semibold focus:ring-2 focus:ring-blue-500 outline-none">
                                            {STATUSES.map(s => <option key={s}>{s}</option>)}
                                        </select>
                                    </div>

                                    {/* Decision fields — shown when finalizing */}
                                    {needsDecision && (
                                        <div className="bg-amber-50 border border-amber-200 rounded-2xl p-5 space-y-4 animate-fade-in">
                                            <p className="text-xs font-black text-amber-800 uppercase tracking-wide flex items-center gap-2">
                                                <i data-lucide="gavel" className="w-4 h-4"></i>
                                                Принятие решения — обязательные поля
                                            </p>

                                            <div>
                                                <label className="block text-xs font-bold text-slate-600 mb-1.5">Тип решения *</label>
                                                <select value={decisionType} onChange={e => { setDecisionType(e.target.value); setReferredTo(''); }}
                                                    className="w-full p-3 rounded-xl border border-slate-200 text-sm focus:ring-2 focus:ring-amber-400 outline-none bg-white">
                                                    <option value="">— выберите тип решения —</option>
                                                    {DECISION_TYPES.map(d => <option key={d.value} value={d.value}>{d.label}</option>)}
                                                </select>
                                            </div>

                                            {decisionType === 'law_enforcement' && (
                                                <div>
                                                    <label className="block text-xs font-bold text-slate-600 mb-1.5">Направлено в орган *</label>
                                                    <select value={referredTo} onChange={e => setReferredTo(e.target.value)}
                                                        className="w-full p-3 rounded-xl border border-slate-200 text-sm focus:ring-2 focus:ring-amber-400 outline-none bg-white">
                                                        <option value="">— выберите орган —</option>
                                                        {LAW_ENFORCEMENT_BODIES.map(b => <option key={b}>{b}</option>)}
                                                    </select>
                                                </div>
                                            )}

                                            <div>
                                                <label className="block text-xs font-bold text-slate-600 mb-1.5">Основания принятия решения *</label>
                                                <textarea value={decisionGrounds} onChange={e => setDecisionGrounds(e.target.value)}
                                                    rows="2" placeholder="Мотивированное обоснование, правовые нормы..."
                                                    className="w-full p-3 rounded-xl border border-slate-200 text-sm focus:ring-2 focus:ring-amber-400 outline-none resize-none"></textarea>
                                            </div>

                                            <div>
                                                <label className="block text-xs font-bold text-slate-600 mb-1.5">Оценка представленных материалов *</label>
                                                <textarea value={decisionEvidence} onChange={e => setDecisionEvidence(e.target.value)}
                                                    rows="2" placeholder="Наличие, содержание и достаточность доказательств..."
                                                    className="w-full p-3 rounded-xl border border-slate-200 text-sm focus:ring-2 focus:ring-amber-400 outline-none resize-none"></textarea>
                                            </div>
                                        </div>
                                    )}

                                    <div>
                                        <label className="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1.5">
                                            Ответ заявителю <span className="text-slate-300">(отображается публично)</span>
                                        </label>
                                        <textarea value={responseText} onChange={e => setResponseText(e.target.value)}
                                            rows="3" placeholder="Краткий ответ для заявителя в пределах, не нарушающих законодательство..."
                                            className="w-full p-3 rounded-xl border border-slate-200 text-sm focus:ring-2 focus:ring-blue-500 outline-none resize-none"></textarea>
                                    </div>
                                </div>
                            </div>

                            <div className="p-5 border-t border-slate-100 flex justify-end gap-3 bg-slate-50 flex-shrink-0">
                                <button onClick={() => setSelectedReport(null)}
                                    className="px-6 py-2.5 rounded-xl font-bold text-slate-600 hover:bg-slate-200 transition-colors text-sm">
                                    Отмена
                                </button>
                                <button onClick={handleSave} disabled={saving}
                                    className="px-6 py-2.5 rounded-xl font-bold text-white bg-blue-700 hover:bg-blue-800 transition-colors shadow text-sm disabled:opacity-60">
                                    {saving ? 'Сохранение...' : 'Сохранить решение'}
                                </button>
                            </div>
                        </div>
                    </div>
                )}
            </div>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<AdminApp />);
</script>
</body>
</html>
