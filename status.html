<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Отслеживание статуса обращения</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .state-blue { background-color: #003366; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

<div id="root"></div>

<script type="text/babel">
    const { useState, useEffect } = React;
    const API_BASE = "/api";

    const Header = () => (
        <header className="state-blue py-6 px-4 shadow-lg">
            <div className="max-w-4xl mx-auto flex items-center justify-between">
                <div className="flex items-center space-x-4">
                    <div>
                        <h1 className="text-white font-bold text-xl leading-tight">Проверка статуса</h1>
                    </div>
                </div>
                <div>
                    <a href="index.html" className="text-white/80 hover:text-white text-sm font-medium underline">Подать жалобу</a>
                </div>
            </div>
        </header>
    );

    const App = () => {
        const [shortId, setShortId] = useState('');
        const [loading, setLoading] = useState(false);
        const [result, setResult] = useState(null);
        const [error, setError] = useState('');

        const handleCheck = async (e) => {
            e.preventDefault();
            setLoading(true);
            setError('');
            setResult(null);

            try {
                const res = await fetch(`${API_BASE}/complaints/status/${shortId.trim()}`);
                if (res.ok) {
                    const data = await res.json();
                    setResult(data);
                } else {
                    setError('Обращение с таким кодом не найдено.');
                }
            } catch (err) {
                setError('Ошибка сервера.');
            }
            setLoading(false);
        };

        const getStatusColor = (status) => {
            switch(status) {
                case 'Новая': return 'bg-blue-100 text-blue-800 border-blue-300';
                case 'В работе': return 'bg-amber-100 text-amber-800 border-amber-300';
                case 'Закрыта': return 'bg-emerald-100 text-emerald-800 border-emerald-300';
                default: return 'bg-gray-100 text-gray-800';
            }
        };

        return (
            <div className="flex-1 flex flex-col">
                <Header />
                <main className="flex-1 max-w-xl mx-auto w-full p-4 md:p-8 mt-10">
                    <div className="bg-white p-8 rounded-3xl shadow-xl border border-gray-100">
                        <h2 className="text-2xl font-bold mb-6 text-center">Проверить обращение</h2>
                        
                        <form onSubmit={handleCheck} className="space-y-4">
                            <div>
                                <label className="block text-sm font-bold text-gray-700 mb-2">Код отслеживания (например: CARE-X9J2)</label>
                                <input 
                                    type="text" 
                                    required 
                                    value={shortId} 
                                    onChange={(e) => setShortId(e.target.value.toUpperCase())}
                                    placeholder="CARE-..." 
                                    className="w-full p-4 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-600 outline-none text-xl tracking-wider text-center font-bold uppercase"
                                />
                            </div>
                            <button 
                                type="submit" 
                                disabled={loading}
                                className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition-colors disabled:opacity-50"
                            >
                                {loading ? 'Поиск...' : 'ПРОВЕРИТЬ'}
                            </button>
                        </form>

                        {error && (
                            <div className="mt-6 p-4 bg-red-50 text-red-700 rounded-xl border border-red-200 text-center font-medium">
                                {error}
                            </div>
                        )}

                        {result && (
                            <div className="mt-8 pt-8 border-t border-gray-100 animate-fade-in">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="font-black text-xl text-gray-800">{result.short_id}</h3>
                                    <span className={`px-4 py-1.5 rounded-full text-sm font-bold border ${getStatusColor(result.status)}`}>
                                        {result.status}
                                    </span>
                                </div>
                                
                                <div className="space-y-4">
                                    <div>
                                        <p className="text-xs font-bold text-gray-400 uppercase">Категория</p>
                                        <p className="font-semibold text-gray-800">{result.category}</p>
                                    </div>
                                    <div>
                                        <p className="text-xs font-bold text-gray-400 uppercase">Дата подачи</p>
                                        <p className="font-semibold text-gray-800">{new Date(result.created_at).toLocaleString('ru-RU')}</p>
                                    </div>
                                    
                                    <div className="mt-6 bg-slate-50 p-5 rounded-2xl border border-slate-200">
                                        <p className="text-xs font-bold text-slate-500 uppercase mb-2">Ответ администратора:</p>
                                        {result.admin_response ? (
                                            <p className="text-slate-800">{result.admin_response}</p>
                                        ) : (
                                            <p className="text-slate-400 italic">Ожидает ответа администратора...</p>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </main>
            </div>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
</body>
</html>
